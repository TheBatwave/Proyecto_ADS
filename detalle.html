<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Casa de Subasta — Detalle del producto</title>
  <link rel="stylesheet" href="css/detalle.css">
</head>
<body>

<!-- HEADER -->
<header class="det-header">
  <div class="det-header-inner">
    <div class="det-logo" style="cursor: pointer;" onclick="sessionStorage.removeItem('categoriaActual'); window.location.href='subasta.html';">
      <img src="https://cdn-icons-png.flaticon.com/512/783/783247.png" alt="logo">
      <span>Casa de Subasta</span>
    </div>
    <nav class="det-nav">
      <button onclick="volverAtras()">← Volver</button>
      <a href="index.html"><button> Iniciar sesión</button></a>
    </nav>
  </div>
</header>

<!-- BREADCRUMB -->
<div class="breadcrumb" id="breadcrumb"></div>

<!-- CONTENIDO PRINCIPAL -->
<main class="det-main" id="detContenido">
  <div class="det-loading">Cargando producto...</div>
</main>

<!-- MODAL LOGIN -->
<div id="modalLogin">
  <div class="modal-box">
    <button class="modal-cerrar" onclick="cerrarModal()">✕</button>
    <div class="modal-icono">🔨</div>
    <h3>¡Inicia sesión para pujar!</h3>
    <p>Para participar en esta subasta necesitas iniciar sesión o crear una cuenta.</p>
    <div class="modal-botones">
      <a href="index.html"><button class="btn-login-modal">Iniciar sesión</button></a>
      <button class="btn-cancelar-modal" onclick="cerrarModal()">Seguir explorando</button>
    </div>
  </div>
</div>

<!-- LIGHTBOX -->
<div id="lightbox" onclick="cerrarLightbox()">
  <img id="lightboxImg" src="" alt="">
  <button class="lb-cerrar" onclick="cerrarLightbox()">✕</button>
  <button class="lb-prev" onclick="event.stopPropagation(); moverLightbox(-1)">‹</button>
  <button class="lb-next" onclick="event.stopPropagation(); moverLightbox(1)">›</button>
</div>

<script>
function volverAtras() {
  // Si hay categoría guardada, volver a subasta con esa categoría
  // sessionStorage ya tiene volverCategoria guardado desde subasta.js
  window.location.href = "subasta.html";
}
</script>

<script src="js/productos.js"></script>
<script src="js/storageService.js"></script> 
<script src="js/detalle.js"></script>
</body>
</html>
