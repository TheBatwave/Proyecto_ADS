<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SUBASTA</title>

    <!-- Font Awesome -->
    <script src="https://kit.fontawesome.com/72de7666a8.js" crossorigin="anonymous"></script>

    <!-- CSS -->
    <link rel="stylesheet" href="style.css">

</head>

<body>

    <div class="main-container">

        <div class="container">

            <!-- Encabezado -->
            <div class="nav-like">

                <div class="title"></div>

                <div class="logo">
                    <img class="main-logo"
                        src="https://cdn-icons-png.flaticon.com/512/783/783247.png"
                        alt="logo">
                </div>

            </div>

            <!-- Formulario -->
            <div class="parent">

                <div class="form-login">

                    <div class="sub-title">

                        <h5>Login de Subasta</h5>

                        <!-- Visitante -->
                        <div class="visitante-container">
                            <a class="visitante-link" href="subasta.html">
                                Entrar como visitante
                            </a>
                        </div>

                    </div>

                    <!-- Inputs -->
                    <div class="input-fields">

                        <div class="input-group">
                            <i class="fas fa-user"></i>
                            <input type="email" id="correo"
                                placeholder="Correo electrónico">
                        </div>

                        <div class="input-group password-group">
                            <i class="fas fa-lock"></i>

                            <input type="password" id="password"
                                placeholder="Contraseña">

                            <!-- Mostrar contraseña -->
                            <i class="fas fa-eye"
                                id="mostrarPassword"
                                style="cursor:pointer;"></i>

                        </div>

                    </div>

                    <!-- Checkbox -->
                    <div class="keep">
                        <input class="checkbox"
                            type="checkbox"
                            id="mantener-sesion">

                        <label for="mantener-sesion">
                            Mantener sesión iniciada
                        </label>
                    </div>

                    <!-- Botón -->
                    <button onclick="loginAdmin()">
                        Iniciar sesión
                    </button>

                    <!-- Links -->
                    <div class="forget">
                        <a href="">¿Olvidaste el usuario?</a>
                        <p>o</p>
                        <a href="">¿Olvidaste la contraseña?</a>
                    </div>

                </div>

            </div>

        </div>

    </div>
    <script src="script.js"></script>
<script>

    // Mostrar contraseña
    const mostrarPassword =
        document.getElementById("mostrarPassword");

    const password =
        document.getElementById("password");

    mostrarPassword.addEventListener("click", () => {

        if(password.type === "password"){
            password.type = "text";
        }else{
            password.type = "password";
        }

    });

    // Login admin
    function loginAdmin(){

        let correo =
            document.getElementById("correo").value;

        let pass =
            document.getElementById("password").value;

        if(
            correo === "administrador001@asadmin.com"
            &&
            pass === "AdminSubasta2026"
        ){

            window.location.href = "admin.html";

        }else{

            alert("Correo o contraseña incorrectos");

        }

    }

</script>

</body>

</html>
