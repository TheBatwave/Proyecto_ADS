<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SUBASTA — Inicio</title>
    <script src="https://kit.fontawesome.com/72de7666a8.js" crossorigin="anonymous"></script>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

<div class="main-container">
    <div class="container">

        <div class="nav-like">
            <div class="logo">
                <img class="main-logo" src="https://cdn-icons-png.flaticon.com/512/783/783247.png" alt="logo">
            </div>
        </div>

        <div id="inicio">
            <div class="sub-title">
                <h5>Casa de SUBASTA</h5>
                <div class="visitante-container">
                    <button onclick="irLogin()">Iniciar sesión</button>
                    <button onclick="window.location.href='subasta.html'">Entrar como visitante</button>
                </div>
            </div>
        </div>

        <div class="parent" id="login" style="display:none;">
            <div class="form-login">
                <div class="sub-title">
                    <h5>SUBASTA</h5>
                </div>

                <div class="input-fields">
                    <div class="input-group">
                        <i class="fas fa-user"></i>
                        <input type="email" id="correo" placeholder="Correo electrónico">
                    </div>

                    <div class="input-group password-group">
                        <i class="fas fa-lock"></i>
                        <input type="password" id="password" placeholder="Contraseña">
                        <i class="fas fa-eye" id="mostrarPassword" style="cursor:pointer;"></i>
                    </div>
                </div>

                <div class="keep">
                    <input class="checkbox" type="checkbox" id="mantener-sesion">
                    <label for="mantener-sesion">Mantener sesión iniciada</label>
                </div>

                <button onclick="loginAdmin()">Iniciar sesión</button>

                <div class="forget">
                    <a href="#">¿Olvidaste el usuario y contraseña?</a>
                    <p>o</p>
                    <a href="#" onclick="regresarInicio()">Regresar</a>
                </div>
            </div>
        </div>

    </div>
</div>

<script src="js/script.js"></script>
</body>
</html>
