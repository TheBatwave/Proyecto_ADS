<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Casa de Subasta — Explorar</title>
  <link rel="stylesheet" href="css/subasta.css">
</head>
<body>
 
<!-- HEADER -->
<header class="header">
  <div class="header-inner">
    <div class="header-logo" style="cursor: pointer;" onclick="sessionStorage.removeItem('categoriaActual'); window.location.href='subasta.html';">
      <img src="https://cdn-icons-png.flaticon.com/512/783/783247.png" alt="logo">
      <span>Casa de Subasta</span>
    </div>
    <nav class="header-nav">
      <button onclick="init()"> Inicio</button>
      <a href="index.html"><button> Iniciar sesión</button></a>
    </nav>
  </div>
  <p class="header-sub">Explora las mejores subastas — inicia sesión para pujar</p>
</header>
 
<!-- CONTENIDO PRINCIPAL -->
<main id="contenedorCategorias"></main>
 
<!-- OVERLAY -->
<div id="overlay" onclick="cerrarPanel()"></div>
 
<!-- PANEL LATERAL DETALLE -->
<aside id="panelDetalle">
  <button class="panel-cerrar" onclick="cerrarPanel()">✕ Cerrar</button>
  <div id="panelCuerpo"></div>
</aside>
 
<!-- MODAL LOGIN -->
<div id="modalLogin">
  <div class="modal-box">
    <button class="modal-cerrar" onclick="cerrarModalLogin()">✕</button>
    <div class="modal-icono">🔨</div>
    <h3>¡Regístrate para pujar!</h3>
    <p>Para participar en esta subasta necesitas iniciar sesión o crear una cuenta.</p>
    <div class="modal-botones">
      <a href="index.html"><button class="btn-login-modal">Iniciar sesión</button></a>
      <button class="btn-cancelar-modal" onclick="cerrarModalLogin()">Seguir explorando</button>
    </div>
  </div>
</div>
 
<script src="js/productos.js"></script>
<script src="js/storageService.js"></script>
<script src="js/subasta.js"></script>
</body>
</html>
